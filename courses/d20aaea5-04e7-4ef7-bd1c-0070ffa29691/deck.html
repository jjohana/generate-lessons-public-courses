<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Deck</title><style>:root{--ink:#14253a;--muted:#53657a;--accent:#0c6e82;--accent-strong:#0f4267;--line:rgba(20,37,58,.12);}body{margin:0;font-family:Aptos,'Segoe UI Variable','Trebuchet MS',sans-serif;color:var(--ink);background:#eef4f6;}.deck-shell{display:grid;grid-template-columns:minmax(280px,320px) minmax(0,1fr);min-height:100vh;}.deck-sidebar{padding:24px;background:linear-gradient(180deg,#11283f,#0c6e82);color:#f6fbff;overflow:auto;}.deck-sidebar h1{margin:0;font-family:Cambria,Constantia,serif;font-size:2rem;line-height:1.08;max-width:12ch;text-wrap:pretty;word-break:normal;overflow-wrap:break-word;hyphens:none;}.deck-sidebar p{line-height:1.6;opacity:.92;}.deck-home{display:inline-flex;margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#f6fbff;text-decoration:none;font-weight:700;}.deck-list{display:grid;gap:8px;margin-top:18px;}.deck-item{display:grid;gap:4px;width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);cursor:pointer;text-align:left;color:inherit;font:inherit;}.deck-item.active{background:#f6fbff;color:#14253a;}.deck-item strong{font-size:.95rem;}.deck-item span{font-size:.83rem;line-height:1.45;opacity:.88;}.deck-main{display:grid;grid-template-rows:auto 1fr;min-width:0;}.deck-toolbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;background:rgba(255,255,255,.88);border-bottom:1px solid var(--line);}.deck-actions{display:flex;gap:10px;flex-wrap:wrap;}.deck-actions button,.deck-actions a{display:inline-flex;padding:10px 14px;border-radius:12px;border:1px solid rgba(12,110,130,.12);background:rgba(12,110,130,.08);color:var(--accent-strong);text-decoration:none;font-weight:700;cursor:pointer;font:inherit;}.deck-frame-wrap{paddi ef": "slide-s1-2.html"}, {"page_id": "S1-3", "badge": "S1-3", "title": "Exemple chiffré et répartition des forces internes", "subtitle": "Appliquer la formule de poussée et interpréter la répartition des forces internes dans le moteur.", "href": "s1-3.html"}, {"page_id": "slide::S1-3", "badge": "QCM S1-3", "title": "QCM - Exemple chiffré et répartition des forces internes", "subtitle": "5 questions - correction immédiate", "href": "slide-s1-3.html"}, {"page_id": "S2-1", "badge": "S2-1", "title": "Consommation horaire et consommation spécifique", "subtitle": "Définir les indicateurs de consommation utilisés pour comparer les moteurs.", "href": "s2-1.html"}, {"page_id": "slide::S2-1", "badge": "QCM S2-1", "title": "QCM - Consommation horaire et consommation spécifique", "subtitle": "5 questions - correction immédiate", "href": "slide-s2-1.html"}, {"page_id": "S2-2", "badge": "S2-2", "title": "Puissances du réacteur : calorifique, thermique et utile", "subtitle": "Relier l’énergie chimique du carburant à la puissance propulsive effectivement disponible.", "href": "s2-2.html"}, {"page_id": "slide::S2-2", "badge": "QCM S2-2", "title": "QCM - Puissances du réacteur : calorifique, thermique et utile", "subtitle": "5 questions - correction immédiate", "href": "slide-s2-2.html"}, {"page_id": "S2-3", "badge": "S2-3", "title": "Rendements du turboréacteur et taux de dilution", "subtitle": "Expliquer le sens physique des rendements du moteur et leur ordre de grandeur selon l’architecture.", "href": "s2-3.html"}, {"page_id": "slide::S2-3", "badge": "QCM S2-3", "title": "QCM - Rendements du turboréacteur et taux de dilution", "subtitle": "5 questions - correction immédiate", "href": "slide-s2-3.html"}, {"page_id": "S3-1", "badge": "S3-1", "title": "Principe propulsif du turbopropulseur", "subtitle": "Identifier le rôle de l’hélice dans la production de traction et la logique énergétique du turbopropulseur.", "href": "s3-1.html"}, {"page_id": "slide::S3-1", "badge": "QCM S3-1", "title": "QCM - Principe propulsif du turbopropulseur", "subtitle": "5 questions - correction immédiate", "href": "slide-s3-1.html"}, {"page_id": "S3-2", "badge": "S3-2", "title": "Puissance sur l’arbre, SHP et E.S.H.P.", "subtitle": "Savoir calculer la puissance d’arbre et la puissance totale équivalente d’un turbopropulseur.", "href": "s3-2.html"}, {"page_id": "slide::S3-2", "badge": "QCM S3-2", "title": "QCM - Puissance sur l’arbre, SHP et E.S.H.P.", "subtitle": "5 questions - correction immédiate", "href": "slide-s3-2.html"}, {"page_id": "S4-1", "badge": "S4-1", "title": "Lire le diagramme d’écoulement du CFM56-5", "subtitle": "Interpréter un diagramme de moteur pour relier les grandeurs thermodynamiques et aérodynamiques le long du flux.", "href": "s4-1.html"}, {"page_id": "slide::S4-1", "badge": "QCM S4-1", "title": "QCM - Lire le diagramme d’écoulement du CFM56-5", "subtitle": "5 questions - correction immédiate", "href": "slide-s4-1.html"}, {"page_id": "S5-1", "badge": "S5-1", "title": "Canal d’éjection, cône de raccordement et tuyère", "subtitle": "Comprendre comment l’échappement transforme la pression en vitesse de jet.", "href": "s5-1.html"}, {"page_id": "slide::S5-1", "badge": "QCM S5-1", "title": "QCM - Canal d’éjection, cône de raccordement et tuyère", "subtitle": "5 questions - correction immédiate", "href": "slide-s5-1.html"}, {"page_id": "S5-2", "badge": "S5-2", "title": "Géométries de sortie : flux séparés, flux mélangés et section variable", "subtitle": "Distinguer les principales architectures d’échappement d’un turboréacteur double flux.", "href": "s5-2.html"}, {"page_id": "slide::S5-2", "badge": "QCM S5-2", "title": "QCM - Géométries de sortie : flux séparés, flux mélangés et section variable", "subtitle": "5 questions - correction immédiate", "href": "slide-s5-2.html"}, {"page_id": "S6-1", "badge": "S6-1", "title": "Post-combustion : intérêt, architecture et coût en carburant", "subtitle": "Identifier le rôle de la post-combustion et ses conséq te", "href": "slide-s8-1.html"}, {"page_id": "S8-2", "badge": "S8-2", "title": "Inverseur sur flux secondaire dans les architectures double flux", "subtitle": "Comparer les architectures anciennes et modernes d’inversion de poussée pour comprendre pourquoi l’inversion du seul flux secondaire est privilégiée sur les moteurs récents.", "href": "s8-2.html"}, {"page_id": "slide::S8-2", "badge": "QCM S8-2", "title": "QCM - Inverseur sur flux secondaire et architectures double flux", "subtitle": "5 questions - correction immédiate", "href": "slide-s8-2.html"}, {"page_id": "S9-1", "badge": "S9-1", "title": "Commande pneumatique de l’inverseur : sécurités et organes", "subtitle": "Identifier les organes de commande et comprendre les interverrouillages qui rendent la manœuvre sûre au sol et impossible en vol.", "href": "s9-1.html"}, {"page_id": "slide::S9-1", "badge": "QCM S9-1", "title": "QCM - Commande pneumatique de l’inverseur : sécurités et organes", "subtitle": "5 questions - correction immédiate", "href": "slide-s9-1.html"}, {"page_id": "S9-2", "badge": "S9-2", "title": "Séquence d’un inverseur de poussée et voyants associés", "subtitle": "Comprendre la succession des états de l’inverseur, depuis la mise en inversion jusqu’au retour en poussée positive, et relier chaque phase aux voyants.", "href": "s9-2.html"}, {"page_id": "slide::S9-2", "badge": "QCM S9-2", "title": "QCM - Séquence de fonctionnement et indications de l’inverseur", "subtitle": "5 questions - correction immédiate", "href": "slide-s9-2.html"}, {"page_id": "S10-1", "badge": "S10-1", "title": "Rôle des atterrisseurs, efforts et types de trains", "subtitle": "Identifier les fonctions du train d’atterrissage, les efforts qu’il subit et les principales architectures de trains.", "href": "s10-1.html"}, {"page_id": "slide::S10-1", "badge": "QCM S10-1", "title": "QCM - Rôle des atterrisseurs, efforts et types de trains", "subtitle": "5 questions - correction immédiate", "href": "slide-s10-1.html"}, {"page_id": "S10-2", "badge": "S10-2", "title": "Composition générale d’un train d’atterrissage", "subtitle": "Connaître les principaux sous-ensembles d’un train et les contraintes de construction.", "href": "s10-2.html"}, {"page_id": "slide::S10-2", "badge": "QCM S10-2", "title": "QCM - Composition générale d’un train d’atterrissage", "subtitle": "5 questions - correction immédiate", "href": "slide-s10-2.html"}, {"page_id": "S11-1", "badge": "S11-1", "title": "Géométrie du train et dispositions des roues", "subtitle": "Maîtriser le vocabulaire géométrique associé aux trains d’atterrissage et aux configurations de roues.", "href": "s11-1.html"}, {"page_id": "slide::S11-1", "badge": "QCM S11-1", "title": "QCM - Géométrie du train et dispositions des roues", "subtitle": "5 questions - correction immédiate", "href": "slide-s11-1.html"}, {"page_id": "S12-1", "badge": "S12-1", "title": "Amortisseur oléopneumatique : structure et gonflage", "subtitle": "Expliquer la constitution de l’amortisseur et les précautions de gonflage.", "href": "s12-1.html"}, {"page_id": "slide::S12-1", "badge": "QCM S12-1", "title": "QCM - Amortisseur oléopneumatique : structure et gonflage", "subtitle": "5 questions - correction immédiate", "href": "slide-s12-1.html"}, {"page_id": "S12-2", "badge": "S12-2", "title": "Amortisseur : compression, détente et équilibrage", "subtitle": "Comprendre le rôle complémentaire du **gaz** et de l’**huile** dans les trois phases de fonctionnement d’un amortisseur oléopneumatique.", "href": "s12-2.html"}, {"page_id": "slide::S12-2", "badge": "QCM S12-2", "title": "QCM - Amortisseur : compression, détente et équilibrage", "subtitle": "5 questions - correction immédiate", "href": "slide-s12-2.html"}, {"page_id": "S13-1", "badge": "S13-1", "title": "Train escamotable : rentrée, sortie et verrouillages", "subtitle": "Décrire la cinématique du train escamotable, ses verrouillages et ses sécurités de base.", "href": "s13-1.html"}, {"page_id": "slide::S13-1", "badge": "QCM S13-1", "title": "QCM - Train escamotable : rentrée, sortie et verrouillages", "subtitle": "5 questions - correction immédiate", "href": "slide-s13-1.html"}, {"page_id": "S14-1", "badge": "S14-1", "title": "Roues et pneumatiques : types, structure et dimensions", "subtitle": "Présenter les principaux types de roues et apprendre à lire les dimensions d’un pneumatique.", "href": "s14-1.html"}, {"page_id": "slide::S14-1", "badge": "QCM S14-1", "title": "QCM - Roues et pneumatiques : types, structure et dimensions", "subtitle": "5 questions - correction immédiate", "href": "slide-s14-1.html"}, {"page_id": "S14-2", "badge": "S14-2", "title": "Usure, shimmy, dirigabilité et surveillance", "subtitle": "Relier l’état des pneus, le shimmy et les systèmes de surveillance du train à la sécurité opérationnelle.", "href": "s14-2.html"}, {"page_id": "slide::S14-2", "badge": "QCM S14-2", "title": "QCM - Usure, shimmy, dirigabilité et surveillance", "subtitle": "5 questions - correction immédiate", "href": "slide-s14-2.html"}, {"page_id": "S15-1", "badge": "S15-1", "title": "Circuits de freinage et freins à disques", "subtitle": "Comparer le freinage direct et le freinage assisté, puis identifier les éléments d’un frein à disques d’avion.", "href": "s15-1.html"}, {"page_id": "slide::S15-1", "badge": "QCM S15-1", "title": "QCM - Circuits de freinage et freins à disques", "subtitle": "5 questions - correction immédiate", "href": "slide-s15-1.html"}, {"page_id": "S15-2", "badge": "S15-2", "title": "Anti-skid et anti-brake", "subtitle": "Comprendre les automatismes de sécurité qui optimisent le freinage sans bloquer les roues.", "href": "s15-2.html"}, {"page_id": "slide::S15-2", "badge": "QCM S15-2", "title": "QCM - Anti-skid et anti-brake", "subtitle": "5 questions - correction immédiate", "href": "slide-s15-2.html"}, {"page_id": "S16-1", "badge": "S16-1", "title": "QCM : les repères essentiels sur les atterrisseurs", "subtitle": "Réviser rapidement les définitions, les fonctions et les choix techniques du train d’atterrissage à partir d’un QCM de réactivation.", "href": "s16-1.html"}, {"page_id": "slide::S16-1", "badge": "QCM S16-1", "title": "QCM - Synthèse et entraînement QCM sur les atterrisseurs", "subtitle": "5 questions - correction immédiate", "href": "slide-s16-1.html"}, {"page_id": "final::validation", "badge": "Validation finale", "title": "Validation finale - Cartographie du cours : propulsion aéronautique, échappement, inverseur de poussée et atterrisseurs", "subtitle": "50 questions - correction finale", "href": "final-validation.html"}];const frame=document.getElementById('deck-frame');const titleEl=document.getElementById('deck-title');const subtitleEl=document.getElementById('deck-subtitle');const listEl=document.getElementById('deck-list');let index=0;function renderList(){listEl.innerHTML='';pages.forEach((page,i)=>{const item=document.createElement('button');item.type='button';item.className='deck-item'+(i===index?' active':'');item.innerHTML=`<strong>${page.badge} - ${page.title}</strong><span>${page.subtitle}</span>`;item.onclick=()=>showPage(i);listEl.appendChild(item);});}function showPage(i){index=(i+pages.length)%pages.length;const page=pages[index];const separator=page.href.includes('?')?'&':'?';frame.src=page.href+separator+'embed=1';titleEl.textContent=page.title;subtitleEl.textContent=`${page.badge} - ${index+1}/${pages.length}`;renderList();}document.getElementById('prev-btn').onclick=()=>showPage(index-1);document.getElementById('next-btn').onclick=()=>showPage(index+1);document.getElementById('fullscreen-btn').onclick=()=>{const el=document.querySelector('.deck-frame-wrap');if(document.fullscreenElement){document.exitFullscreen();}else if(el.requestFullscreen){el.requestFullscreen();}};window.addEventListener('keydown',(event)=>{if(event.key==='ArrowLeft'){showPage(index-1);}if(event.key==='ArrowRight'){showPage(index+1);}});showPage(0);</script></body></html>
