<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Deck</title><style>:root{--ink:#14253a;--muted:#53657a;--accent:#0c6e82;--accent-strong:#0f4267;--line:rgba(20,37,58,.12);}body{margin:0;font-family:Aptos,'Segoe UI Variable','Trebuchet MS',sans-serif;color:var(--ink);background:#eef4f6;}.deck-shell{display:grid;grid-template-columns:minmax(280px,320px) minmax(0,1fr);min-height:100vh;}.deck-sidebar{padding:24px;background:linear-gradient(180deg,#11283f,#0c6e82);color:#f6fbff;overflow:auto;}.deck-sidebar h1{margin:0;font-family:Cambria,Constantia,serif;font-size:2rem;line-height:1.08;max-width:12ch;text-wrap:pretty;word-break:normal;overflow-wrap:break-word;hyphens:none;}.deck-sidebar p{line-height:1.6;opacity:.92;}.deck-home{display:inline-flex;margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#f6fbff;text-decoration:none;font-weight:700;}.deck-list{display:grid;gap:8px;margin-top:18px;}.deck-item{display:grid;gap:4px;width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);cursor:pointer;text-align:left;color:inherit;font:inherit;}.deck-item.active{background:#f6fbff;color:#14253a;}.deck-item strong{font-size:.95rem;}.deck-item span{font-size:.83rem;line-height:1.45;opacity:.88;}.deck-main{display:grid;grid-template-rows:auto 1fr;min-width:0;}.deck-toolbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;background:rgba(255,255,255,.88);border-bottom:1px solid var(--line);}.deck-actions{display:flex;gap:10px;flex-wrap:wrap;}.deck-actions button,.deck-actions a{display:inline-flex;padding:10px 14px;border-radius:12px;border:1px solid rgba(12,110,130,.12);background:rgba(12,110,130,.08);color:var(--accent-strong);text-decoration:none;font-weight:700;cursor:pointer;font:inherit;}.deck-frame-wrap{padding:16px;min-width:0;min-height:0;}.deck-frame{width:100%;height:calc(100vh - 92px);border:0;border-radius:20px;background:#fff;box-shadow:0 18px 48px rgba(20,37,58,.16);}@media (max-width:980px){.deck-shell{grid-template-columns:1fr;}.deck-frame{height:72vh;}}</style></head><body><div class='deck-shell'><aside class='deck-sidebar'><h1>Cinematique BTS Aero</h1><p>cours-complet-cinematique-bts-aero.docx. Navigation entre slides et QCM.</p><a class='deck-home' href='index.html'>Retour au sommaire</a><div class='deck-list' id='deck-list'></div></aside><main class='deck-main'><div class='deck-toolbar'><div><strong id='deck-title'></strong><div id='deck-subtitle'></div></div><div class='deck-actions'><button type='button' id='prev-btn'>Précédent</button><button type='button' id='next-btn'>Suivante</button><button type='button' id='fullscreen-btn'>Plein écran</button></div></div><div class='deck-frame-wrap'><iframe id='deck-frame' class='deck-frame' title='Deck pages'></iframe></div></main></div><script>const pages=[{"page_id": "SL01", "badge": "SL01", "title": "Introduction à la cinématique", "subtitle": "Identifier ce que décrit la cinématique et la distinguer de la dynamique dans un contexte aéronautique.", "href": "sl01.html"}, {"page_id": "slide::SL01", "badge": "QCM SL01", "title": "QCM - Introduction à la cinématique", "subtitle": "5 questions - correction immédiate", "href": "slide-sl01.html"}, {"page_id": "SL02", "badge": "SL02", "title": "Système étudié et point matériel", "subtitle": "Choisir correctement le système étudié et comprendre quand l’approximation de point matériel est valable.", "href": "sl02.html"}, {"page_id": "slide::SL02", "badge": "QCM SL02", "title": "QCM - Système étudié et point matériel", "subtitle": "5 questions - correction immédiate", "href": "slide-sl02.html"}, {"page_id": "SL03", "badge": "SL03", "title": "Référentiel et vecteur position", "subtitle": "Comprendre le rôle du référentiel et écrire la position d’un point dans l’espace.", " tle": "5 questions - correction immédiate", "href": "slide-sl13.html"}, {"page_id": "SL14", "badge": "SL14", "title": "Liens entre grandeurs angulaires et linéaires", "subtitle": "Exploiter les relations entre rotation et mouvement linéaire au bord d’un disque ou d’une hélice.", "href": "sl14.html"}, {"page_id": "slide::SL14", "badge": "QCM SL14", "title": "QCM - Liens entre grandeurs angulaires et linéaires", "subtitle": "5 questions - correction immédiate", "href": "slide-sl14.html"}, {"page_id": "SL15", "badge": "SL15", "title": "Méthodes graphiques en cinématique", "subtitle": "Extraire des informations cinématiques à partir de courbes expérimentales.", "href": "sl15.html"}, {"page_id": "slide::SL15", "badge": "QCM SL15", "title": "QCM - Méthodes graphiques en cinématique", "subtitle": "5 questions - correction immédiate", "href": "slide-sl15.html"}, {"page_id": "SL16", "badge": "SL16", "title": "Du signal brut au signal exploitable", "subtitle": "Traiter des mesures réelles, bruitées ou discrètes, à l’aide d’outils numériques.", "href": "sl16.html"}, {"page_id": "slide::SL16", "badge": "QCM SL16", "title": "QCM - Exploitation expérimentale et filtrage des données", "subtitle": "5 questions - correction immédiate", "href": "slide-sl16.html"}, {"page_id": "SL17", "badge": "SL17", "title": "Étude de cas : mouvement circulaire d’une hélice", "subtitle": "Appliquer les relations du mouvement circulaire à une hélice et interpréter les contraintes mécaniques.", "href": "sl17.html"}, {"page_id": "slide::SL17", "badge": "QCM SL17", "title": "QCM - Étude de cas : mouvement circulaire d’une hélice", "subtitle": "5 questions - correction immédiate", "href": "slide-sl17.html"}, {"page_id": "SL18", "badge": "SL18", "title": "Approche numérique avec Python", "subtitle": "Simuler une cinématique à partir de données discrètes et dériver numériquement position, vitesse et accélération.", "href": "sl18.html"}, {"page_id": "slide::SL18", "badge": "QCM SL18", "title": "QCM - Approche numérique avec Python", "subtitle": "5 questions - correction immédiate", "href": "slide-sl18.html"}, {"page_id": "SL19", "badge": "SL19", "title": "Applications aéronautiques typiques", "subtitle": "Identifier les situations industrielles où la cinématique est mobilisée en aéronautique.", "href": "sl19.html"}, {"page_id": "slide::SL19", "badge": "QCM SL19", "title": "QCM - Applications aéronautiques typiques", "subtitle": "5 questions - correction immédiate", "href": "slide-sl19.html"}, {"page_id": "SL20", "badge": "SL20", "title": "Formulaire, erreurs à éviter et conclusion", "subtitle": "Consolider les relations essentielles, sécuriser les calculs et montrer que la cinématique est la base de la dynamique et des applications aéronautiques.", "href": "sl20.html"}, {"page_id": "slide::SL20", "badge": "QCM SL20", "title": "QCM - Formulaire, erreurs à éviter et conclusion", "subtitle": "5 questions - correction immédiate", "href": "slide-sl20.html"}, {"page_id": "final::validation", "badge": "Validation finale", "title": "Validation finale - Cartographie du cours de cinématique – BTS Aéronautique (1ʳᵉ année)", "subtitle": "50 questions - correction finale", "href": "final-validation.html"}];const frame=document.getElementById('deck-frame');const titleEl=document.getElementById('deck-title');const subtitleEl=document.getElementById('deck-subtitle');const listEl=document.getElementById('deck-list');let index=0;function renderList(){listEl.innerHTML='';pages.forEach((page,i)=>{const item=document.createElement('button');item.type='button';item.className='deck-item'+(i===index?' active':'');item.innerHTML=`<strong>${page.badge} - ${page.title}</strong><span>${page.subtitle}</span>`;item.onclick=()=>showPage(i);listEl.appendChild(item);});}function showPage(i){index=(i+pages.length)%pages.length;const page=pages[index];const separator=page.href.includes('?')?'&':'?';frame.src=page.href+separator+'embed=1';titleEl.textContent=page.title;subtitleEl.textContent=`${page.badge} - ${index+1}/${pages.length}`;renderList();}document.getElementById('prev-btn').onclick=()=>showPage(index-1);document.getElementById('next-btn').onclick=()=>showPage(index+1);document.getElementById('fullscreen-btn').onclick=()=>{const el=document.querySelector('.deck-frame-wrap');if(document.fullscreenElement){document.exitFullscreen();}else if(el.requestFullscreen){el.requestFullscreen();}};window.addEventListener('keydown',(event)=>{if(event.key==='ArrowLeft'){showPage(index-1);}if(event.key==='ArrowRight'){showPage(index+1);}});showPage(0);</script></body></html>
