<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Deck</title><style>:root{--ink:#14253a;--muted:#53657a;--accent:#0c6e82;--accent-strong:#0f4267;--line:rgba(20,37,58,.12);}body{margin:0;font-family:Aptos,'Segoe UI Variable','Trebuchet MS',sans-serif;color:var(--ink);background:#eef4f6;}.deck-shell{display:grid;grid-template-columns:minmax(280px,320px) minmax(0,1fr);min-height:100vh;}.deck-sidebar{padding:24px;background:linear-gradient(180deg,#11283f,#0c6e82);color:#f6fbff;overflow:auto;}.deck-sidebar h1{margin:0;font-family:Cambria,Constantia,serif;font-size:2rem;line-height:1.08;max-width:12ch;text-wrap:pretty;word-break:normal;overflow-wrap:break-word;hyphens:none;}.deck-sidebar p{line-height:1.6;opacity:.92;}.deck-home{display:inline-flex;margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#f6fbff;text-decoration:none;font-weight:700;}.deck-list{display:grid;gap:8px;margin-top:18px;}.deck-item{display:grid;gap:4px;width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);cursor:pointer;text-align:left;color:inherit;font:inherit;}.deck-item.active{background:#f6fbff;color:#14253a;}.deck-item strong{font-size:.95rem;}.deck-item span{font-size:.83rem;line-height:1.45;opacity:.88;}.deck-main{display:grid;grid-template-rows:auto 1fr;min-width:0;}.deck-toolbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;background:rgba(255,255,255,.88);border-bottom:1px solid var(--line);}.deck-actions{display:flex;gap:10px;flex-wrap:wrap;}.deck-actions button,.deck-actions a{display:inline-flex;padding:10px 14px;border-radius:12px;border:1px solid rgba(12,110,130,.12);background:rgba(12,110,130,.08);color:var(--accent-strong);text-decoration:none;font-weight:700;cursor:pointer;font:inherit;}.deck-frame-wrap{paddi r l’encadrement de la charge des batteries et les interactions entre réseaux.", "href": "s5-4.html"}, {"page_id": "slide::S5-4", "badge": "QCM S5-4", "title": "QCM - BCL et architecture d’interconnexion DC/AC", "subtitle": "5 questions - correction immédiate", "href": "slide-s5-4.html"}, {"page_id": "S6-1", "badge": "S6-1", "title": "Panneau AC GENERATION : commande et indications", "subtitle": "Identifier les fonctions de pilotage et de signalisation du panneau de génération AC.", "href": "s6-1.html"}, {"page_id": "slide::S6-1", "badge": "QCM S6-1", "title": "QCM - Panneau AC GENERATION : commande et indications", "subtitle": "5 questions - correction immédiate", "href": "slide-s6-1.html"}, {"page_id": "S6-2", "badge": "S6-2", "title": "Lire la page ECAM ELEC AC : sources et paramètres", "subtitle": "Identifier les sources AC affichées sur l’ECAM et comprendre ce que leurs indications disent de leur disponibilité et de leur raccordement au réseau.", "href": "s6-2.html"}, {"page_id": "slide::S6-2", "badge": "QCM S6-2", "title": "QCM - ECAM ELEC : lecture des sources et paramètres", "subtitle": "5 questions - correction immédiate", "href": "slide-s6-2.html"}, {"page_id": "S6-3", "badge": "S6-3", "title": "Synoptique électrique : bus, batterie et transferts", "subtitle": "Lire le synoptique pour identifier les **bus**, la **batterie** et les **chemins de transfert** de l’alimentation.", "href": "s6-3.html"}, {"page_id": "slide::S6-3", "badge": "QCM S6-3", "title": "QCM - Synoptique électrique : bus, batterie et transferts", "subtitle": "5 questions - correction immédiate", "href": "slide-s6-3.html"}, {"page_id": "S6-4", "badge": "S6-4", "title": "EMER ELEC PWR : test et commande de l’urgence", "subtitle": "Montrer que le panneau EMER ELEC PWR sert à tester et à commander la source électrique d’urgence, tandis que l’ECAM confirme l’état réel des sources et des bus.", "href": "s6-4.html"}, {"page_id": "slide::S6-4", "badge": "QCM S6-4", "title": "QCM - EMER ELEC PWR : t ementById('deck-list');let index=0;function renderList(){listEl.innerHTML='';pages.forEach((page,i)=>{const item=document.createElement('button');item.type='button';item.className='deck-item'+(i===index?' active':'');item.innerHTML=`<strong>${page.badge} - ${page.title}</strong><span>${page.subtitle}</span>`;item.onclick=()=>showPage(i);listEl.appendChild(item);});}function showPage(i){index=(i+pages.length)%pages.length;const page=pages[index];const separator=page.href.includes('?')?'&':'?';frame.src=page.href+separator+'embed=1';titleEl.textContent=page.title;subtitleEl.textContent=`${page.badge} - ${index+1}/${pages.length}`;renderList();}document.getElementById('prev-btn').onclick=()=>showPage(index-1);document.getElementById('next-btn').onclick=()=>showPage(index+1);document.getElementById('fullscreen-btn').onclick=()=>{const el=document.querySelector('.deck-frame-wrap');if(document.fullscreenElement){document.exitFullscreen();}else if(el.requestFullscreen){el.requestFullscreen();}};window.addEventListener('keydown',(event)=>{if(event.key==='ArrowLeft'){showPage(index-1);}if(event.key==='ArrowRight'){showPage(index+1);}});showPage(0);</script></body></html>
