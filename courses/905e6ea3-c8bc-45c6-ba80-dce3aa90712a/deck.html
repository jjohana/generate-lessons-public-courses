<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Deck</title><style>:root{--ink:#14253a;--muted:#53657a;--accent:#0c6e82;--accent-strong:#0f4267;--line:rgba(20,37,58,.12);}body{margin:0;font-family:Aptos,'Segoe UI Variable','Trebuchet MS',sans-serif;color:var(--ink);background:#eef4f6;}.deck-shell{display:grid;grid-template-columns:minmax(280px,320px) minmax(0,1fr);min-height:100vh;}.deck-sidebar{padding:24px;background:linear-gradient(180deg,#11283f,#0c6e82);color:#f6fbff;overflow:auto;}.deck-sidebar h1{margin:0;font-family:Cambria,Constantia,serif;font-size:2rem;line-height:1.08;max-width:12ch;text-wrap:pretty;word-break:normal;overflow-wrap:break-word;hyphens:none;}.deck-sidebar p{line-height:1.6;opacity:.92;}.deck-home{display:inline-flex;margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);color:#f6fbff;text-decoration:none;font-weight:700;}.deck-list{display:grid;gap:8px;margin-top:18px;}.deck-item{display:grid;gap:4px;width:100%;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);cursor:pointer;text-align:left;color:inherit;font:inherit;}.deck-item.active{background:#f6fbff;color:#14253a;}.deck-item strong{font-size:.95rem;}.deck-item span{font-size:.83rem;line-height:1.45;opacity:.88;}.deck-main{display:grid;grid-template-rows:auto 1fr;min-width:0;}.deck-toolbar{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;background:rgba(255,255,255,.88);border-bottom:1px solid var(--line);}.deck-actions{display:flex;gap:10px;flex-wrap:wrap;}.deck-actions button,.deck-actions a{display:inline-flex;padding:10px 14px;border-radius:12px;border:1px solid rgba(12,110,130,.12);background:rgba(12,110,130,.08);color:var(--accent-strong);text-decoration:none;font-weight:700;cursor:pointer;font:inherit;}.deck-frame-wrap{paddi
